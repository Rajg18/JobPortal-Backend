spring.application.name=JobPortal

# ─── Database ─────────────────────────────────────────────────────────────────
# Local defaults are set here. On production (Railway/Render) override these
# by setting DB_URL, DB_USERNAME, DB_PASSWORD as environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portalDB}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:626117}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# ─── JWT ──────────────────────────────────────────────────────────────────────
# On production set JWT_SECRET to a strong random Base64 key via env var.
jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itand0}
jwt.expiration.ms=3600000

# ─── CORS ─────────────────────────────────────────────────────────────────────
# http://localhost:* → allows ANY localhost port (Flutter web uses random ports in dev)
# In production, override CORS_ALLOWED_ORIGINS env var with your exact frontend domain.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}

# ─── Swagger / springdoc ──────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
